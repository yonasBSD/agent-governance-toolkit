name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: >
          Package to publish. Use "all" for everything, "all-python" for all
          Python packages, or a specific name (e.g. "agent-os", "langchain-agentmesh").
        required: true
        type: string
        default: "all"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  # -------------------------------------------------------------------
  # Build Python packages and attest provenance.
  #
  # IMPORTANT: Actual PyPI publishing is done via the ADO pipeline
  # (.github/pipelines/pypi-publish.yml) using ESRP Release. GitHub Actions
  # Trusted Publishers are NOT compliant for Microsoft PyPI publishing.
  # See: docs/internal/pypi-publishing.md
  # -------------------------------------------------------------------
  resolve-python-matrix:
    if: >-
      github.event_name == 'release' ||
      github.event.inputs.package != 'agent-governance-dotnet'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      any: ${{ steps.resolve.outputs.any }}
    steps:
      - name: Resolve Python package matrix
        id: resolve
        run: |
          # Complete list of publishable Python packages (41 packages)
          ALL='[
            {"name":"agent-os","path":"agent-governance-python/agent-os"},
            {"name":"agent-mesh","path":"agent-governance-python/agent-mesh"},
            {"name":"agent-hypervisor","path":"agent-governance-python/agent-hypervisor"},
            {"name":"agent-sre","path":"agent-governance-python/agent-sre"},
            {"name":"agent-compliance","path":"agent-governance-python/agent-compliance"},
            {"name":"agent-runtime","path":"agent-governance-python/agent-runtime"},
            {"name":"agent-lightning","path":"agent-governance-python/agent-lightning"},
            {"name":"agent-marketplace","path":"agent-governance-python/agent-marketplace"},
            {"name":"agent-mcp-governance","path":"agent-governance-python/agent-mcp-governance"},
            {"name":"agent-discovery","path":"agent-governance-python/agent-discovery"},
            {"name":"agent-primitives","path":"agent-governance-python/agent-primitives"},
            {"name":"agentmesh-message-bus","path":"agent-governance-python/agent-os/modules/amb"},
            {"name":"agent-tool-registry","path":"agent-governance-python/agent-os/modules/atr"},
            {"name":"agentmesh-context","path":"agent-governance-python/agent-os/modules/caas"},
            {"name":"agentmesh-drift","path":"agent-governance-python/agent-os/modules/cmvk"},
            {"name":"agent-control-plane","path":"agent-governance-python/agent-os/modules/control-plane"},
            {"name":"agentmesh-memory","path":"agent-governance-python/agent-os/modules/emk"},
            {"name":"agent-trust-protocol","path":"agent-governance-python/agent-os/modules/iatp"},
            {"name":"agentmesh-mcp-server","path":"agent-governance-python/agent-os/modules/mcp-kernel-server"},
            {"name":"agentmesh-nexus","path":"agent-governance-python/agent-os/modules/nexus"},
            {"name":"agent-observability","path":"agent-governance-python/agent-os/modules/observability"},
            {"name":"agentmesh-mcp-trust","path":"agent-governance-python/agent-mesh/packages/mcp-trust-server"},
            {"name":"a2a-protocol","path":"agent-governance-python/agentmesh-integrations/a2a-protocol"},
            {"name":"adk-agentmesh","path":"agent-governance-python/agentmesh-integrations/adk-agentmesh"},
            {"name":"avp-agentmesh","path":"agent-governance-python/agentmesh-integrations/agentmesh-avp"},
            {"name":"agentmesh-audit-export","path":"agent-governance-python/agentmesh-integrations/audit-accountability-export"},
            {"name":"crewai-agentmesh","path":"agent-governance-python/agentmesh-integrations/crewai-agentmesh"},
            {"name":"flowise-agentmesh","path":"agent-governance-python/agentmesh-integrations/flowise-agentmesh"},
            {"name":"haystack-agentmesh","path":"agent-governance-python/agentmesh-integrations/haystack-agentmesh"},
            {"name":"langchain-agentmesh","path":"agent-governance-python/agentmesh-integrations/langchain-agentmesh"},
            {"name":"langflow-agentmesh","path":"agent-governance-python/agentmesh-integrations/langflow-agentmesh"},
            {"name":"langgraph-agentmesh","path":"agent-governance-python/agentmesh-integrations/langgraph-trust"},
            {"name":"llamaindex-agentmesh","path":"agent-governance-python/agentmesh-integrations/llamaindex-agentmesh"},
            {"name":"agentmesh-mcp-receipts","path":"agent-governance-python/agentmesh-integrations/mcp-receipt-governed"},
            {"name":"agentmesh-mcp-proxy","path":"agent-governance-python/agentmesh-integrations/mcp-trust-proxy"},
            {"name":"nostr-wot-agentmesh","path":"agent-governance-python/agentmesh-integrations/nostr-wot"},
            {"name":"openai-agents-agentmesh","path":"agent-governance-python/agentmesh-integrations/openai-agents-agentmesh"},
            {"name":"openai-agents-trust","path":"agent-governance-python/agentmesh-integrations/openai-agents-trust"},
            {"name":"openshell-skill","path":"agent-governance-python/agentmesh-integrations/openshell-skill"},
            {"name":"pydantic-ai-agentmesh","path":"agent-governance-python/agentmesh-integrations/pydantic-ai-governance"},
            {"name":"structural-authz-agentmesh","path":"agent-governance-python/agentmesh-integrations/structural-authz-agentmesh"}
          ]'
          # Compact the JSON
          ALL=$(echo "$ALL" | jq -c '.')

          INPUT="${{ github.event.inputs.package }}"
          if [ "${{ github.event_name }}" = "release" ] || [ "$INPUT" = "all" ] || [ "$INPUT" = "all-python" ]; then
            echo "matrix={\"include\":$ALL}" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT" ] && [ "$INPUT" != "agent-governance-dotnet" ]; then
            FILTERED=$(echo "$ALL" | jq -c "[.[] | select(.name == \"$INPUT\")]")
            if [ "$FILTERED" = "[]" ]; then
              echo "::error::Unknown package '$INPUT'. Run with 'all' to see available packages."
              echo "any=false" >> "$GITHUB_OUTPUT"
            else
              echo "matrix={\"include\":$FILTERED}" >> "$GITHUB_OUTPUT"
              echo "any=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
          fi

  build-python:
    needs: resolve-python-matrix
    if: needs.resolve-python-matrix.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-python-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          # Require hash verification via requirements file (CWE-295)
          printf 'build==1.2.1 --hash=sha256:75e10f767a433d9a86e50d83f418e83efc18ede923ee5ff7df93b6cb0306c5d4\n' > /tmp/build-req.txt
          pip install --no-cache-dir --require-hashes -r /tmp/build-req.txt

      - name: Build ${{ matrix.name }}
        working-directory: ${{ matrix.path }}
        run: python -m build

      - name: Validate build artifacts
        working-directory: ${{ matrix.path }}
        run: |
          echo "=== Built artifacts for ${{ matrix.name }} ==="
          ls -la dist/
          # At least one wheel is required by Microsoft Python team policy
          if ! ls dist/*.whl 1>/dev/null 2>&1; then
            echo "::error::No wheel (.whl) found for ${{ matrix.name }} — at least one wheel is required"
            exit 1
          fi

      - name: Sign release artifacts with sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: ${{ matrix.path }}/dist/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ matrix.path }}/dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pypi-${{ matrix.name }}
          path: ${{ matrix.path }}/dist/
          retention-days: 30

  # -------------------------------------------------------------------
  # Build npm packages, pack .tgz, and upload artifacts.
  #
  # IMPORTANT: Actual npm publishing is done via the ADO pipeline
  # (.github/pipelines/npm-publish.yml) using ESRP Release. GitHub Actions
  # is NOT compliant for Microsoft npm publishing.
  # See: PUBLISHING.md
  # -------------------------------------------------------------------
  build-npm:
    if: ${{ github.event_name == 'release' || github.event.inputs.package == 'all' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agentmesh-copilot-governance
            path: agent-governance-python/agentmesh-integrations/copilot-governance
          - name: agentmesh-mastra
            path: agent-governance-python/agentmesh-integrations/mastra-agentmesh
          - name: agentmesh-api
            path: agent-governance-python/agent-mesh/services/api
          - name: agentmesh-mcp-proxy
            path: agent-governance-python/agent-mesh/packages/mcp-proxy
          - name: agentmesh-sdk
            path: agent-governance-typescript
          - name: agent-os-copilot-extension
            path: agent-governance-python/agent-os/extensions/copilot
          - name: agentos-mcp-server
            path: agent-governance-python/agent-os/extensions/mcp-server
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Build ${{ matrix.name }}
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Pack ${{ matrix.name }}
        working-directory: ${{ matrix.path }}
        run: |
          mkdir -p tgz-output
          npm pack --pack-destination tgz-output
          echo "=== Packed ==="
          ls -la tgz-output/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ matrix.path }}/tgz-output/*.tgz

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-${{ matrix.name }}
          path: ${{ matrix.path }}/tgz-output/*.tgz
          retention-days: 30

  publish-nuget:
    if: ${{ github.event_name == 'release' || github.event.inputs.package == 'agent-governance-dotnet' || github.event.inputs.package == 'all' }}
    runs-on: ubuntu-latest
    environment: nuget
    env:
      ESRP_CONFIGURED: ${{ secrets.ESRP_AAD_ID != '' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "8.0.x"

      - name: Install NuGet CLI
        run: |
          # Pin to specific version with SHA-256 verification (CWE-494)
          NUGET_VERSION="v6.12.2"
          NUGET_URL="https://dist.nuget.org/win-x86-commandline/${NUGET_VERSION}/nuget.exe"
          NUGET_SHA256="64f467376f2ee364ba389461df4a29a8f8dd9aa38120d29046e70b9c82045d97"
          curl -fsSL -o /usr/local/bin/nuget.exe "$NUGET_URL"
          echo "${NUGET_SHA256}  /usr/local/bin/nuget.exe" | sha256sum -c -
          echo 'alias nuget="mono /usr/local/bin/nuget.exe"' >> ~/.bashrc

      - name: Build .NET SDK
        working-directory: agent-governance-dotnet
        run: dotnet build --configuration Release

      - name: Test .NET SDK
        working-directory: agent-governance-dotnet
        run: dotnet test --configuration Release --no-build

      - name: Pack NuGet package
        working-directory: agent-governance-dotnet
        run: dotnet pack src/AgentGovernance/AgentGovernance.csproj --configuration Release --no-build --output ./nupkg

      # ----------------------------------------------------------------
      # ESRP Signing — Authenticode sign DLLs + NuGet package signing
      # All config sourced from GitHub Secrets:
      #   ESRP_AAD_ID, ESRP_KEYVAULT_NAME, ESRP_CERT_IDENTIFIER
      # Key code CP-401405 is the Microsoft NuGet signing certificate.
      #
      # TODO: Replace the placeholder steps below with actual ESRP
      # signing invocations once PRSS certificates are generated and
      # uploaded to Key Vault. Until then, packages are built, tested,
      # attested, and uploaded as artifacts but NOT published to NuGet.
      # Production publishing uses the ADO pipeline
      # (.github/pipelines/esrp-publish.yml).
      # ----------------------------------------------------------------
      - name: Authenticode sign assemblies (ESRP)
        id: sign-dll
        if: ${{ env.ESRP_CONFIGURED == 'true' }}
        env:
          ESRP_AAD_ID: ${{ secrets.ESRP_AAD_ID }}
          ESRP_KEYVAULT_NAME: ${{ secrets.ESRP_KEYVAULT_NAME }}
          ESRP_CERT_IDENTIFIER: ${{ secrets.ESRP_CERT_IDENTIFIER }}
        run: |
          echo "DLLs awaiting Authenticode signing:"
          find agent-governance-dotnet -name '*.dll' -path '*/Release/*' | head -20
          echo "::warning::ESRP Authenticode signing pending PRSS certificate setup. Packages will not be published to NuGet from this workflow. Use the ADO pipeline for production publishing."
          echo "signed=false" >> "$GITHUB_OUTPUT"

      - name: Sign NuGet package (ESRP)
        id: sign-nuget
        if: ${{ env.ESRP_CONFIGURED == 'true' }}
        env:
          ESRP_AAD_ID: ${{ secrets.ESRP_AAD_ID }}
          ESRP_KEYVAULT_NAME: ${{ secrets.ESRP_KEYVAULT_NAME }}
          ESRP_CERT_IDENTIFIER: ${{ secrets.ESRP_CERT_IDENTIFIER }}
        run: |
          echo "NuGet packages awaiting ESRP signing (KeyCode CP-401405):"
          ls -la agent-governance-dotnet/nupkg/*.nupkg 2>/dev/null || true
          echo "::warning::ESRP NuGet signing pending PRSS certificate setup. Use the ADO pipeline for production publishing."
          echo "signed=false" >> "$GITHUB_OUTPUT"

      - name: Validate NuGet package metadata
        working-directory: agent-governance-dotnet
        run: |
          echo "=== Validating Microsoft NuGet compliance ==="
          for pkg in ./nupkg/*.nupkg; do
            echo "--- Package: $pkg ---"
            dotnet nuget verify "$pkg" --all 2>/dev/null || echo "(Unsigned package — signing required before production publish)"
            # Inspect package metadata
            unzip -p "$pkg" '*.nuspec' | head -30
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: agent-governance-dotnet/nupkg/*.nupkg

      - name: Attest symbol package provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: agent-governance-dotnet/nupkg/*.snupkg
        continue-on-error: true

      - name: Publish to NuGet
        if: ${{ env.ESRP_CONFIGURED == 'true' && steps.sign-dll.outputs.signed == 'true' && steps.sign-nuget.outputs.signed == 'true' }}
        working-directory: agent-governance-dotnet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::warning::NUGET_API_KEY not set, skipping NuGet publish"
            exit 0
          fi
          # Push both .nupkg and .snupkg (symbol package)
          dotnet nuget push ./nupkg/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          echo "=== Verifying published package signature ==="
          echo "Run: NuGet.exe verify -Signatures <pkg> -CertificateFingerprint 3F9001EA83C560D712C24CF213C3D312CB3BFF51EE89435D3430BD06B5D0EECE;AA12DA22A49BCE7D5C1AE64CC1F3D892F150DA76140F210ABD2CBFFCA2C18A27;566A31882BE208BE4422F7CFD66ED09F5D4524A5994F50CCC8B05EC0528C1353"

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-packages
          path: agent-governance-dotnet/nupkg/*
          retention-days: 30
