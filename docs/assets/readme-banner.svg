  </g>
  <!-- Microsoft text -->
  <text x="340" y="115" font-family="Segoe UI, -apple-system, sans-serif" font-size="22" fill="#50E6FF" font-weight="300" letter-spacing="3">MICROSOFT</text>
  <!-- Main title -->
  <text x="340" y="165" font-family="Segoe UI, -apple-system, sans-serif" font-size="46" fill="white" font-weight="600">Agent Governance Toolkit</text>
  <!-- Subtitle -->
  <text x="340" y="210" font-family="Segoe UI, -apple-system, sans-serif" font-size="18" fill="#B4D6F0" font-weight="300">Runtime governance for AI agents — covering all 10 OWASP Agentic risks</text>
