[workspace]
members = ["agentmesh", "agentmesh-mcp"]
resolver = "2"

[workspace.package]
version = "3.0.2"
edition = "2021"
license = "MIT"
repository = "https://github.com/microsoft/agent-governance-toolkit"
rust-version = "1.70"

[workspace.dependencies]
base64 = "=0.22.1"
ed25519-dalek = { version = "=2.2.0", features = ["rand_core"] }
hmac = "=0.12.1"
rand = "=0.8.5"
regex = "=1.12.2"
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"
serde_yaml = "=0.9.34"
sha2 = "=0.10.9"
thiserror = "=2.0.18"
tempfile = "=3.27.0"
